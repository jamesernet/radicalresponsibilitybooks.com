[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

# Redirect www to non-www (update domain when confirmed)
# [[redirects]]
#   from = "https://www.radicaleresponsibility.com/*"
#   to = "https://radicaleresponsibility.com/:splat"
#   status = 301
#   force = true

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML with short TTL so content updates propagate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
